name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]


jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: false
          load: true
          tags: portfolio:ci
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Extract binary
        run: |
          id=$(docker create portfolio:ci)
          docker cp "$id":/app/portfolio_backend ./portfolio_backend
          docker rm "$id"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-backend-linux-x86_64
          path: portfolio_backend
          retention-days: 7

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || inputs.create_release == true

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          sparse-checkout: frontend
          sparse-checkout-cone-mode: false

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: portfolio-backend-linux-x86_64

      - name: Package binary
        run: tar -czf portfolio-backend-linux-x86_64.tar.gz portfolio_backend

      - name: Package frontend
        run: tar -czf frontend.tar.gz frontend

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            portfolio-backend-linux-x86_64.tar.gz
            frontend.tar.gz
